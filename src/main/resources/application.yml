spring:
  application:
    name: aist
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/aist?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# DeepSeek API configuration
deepseek:
  api:
    key: sk-35e3b2f369ea4c97a90530de4366af7a

# aist requirement analysis configuration
aist:
  # Target project database (for getting table schema)
  target-db:
    url: jdbc:mysql://127.0.0.1:3306/aist?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    default-database: aist
  # Code repository configuration
  code-repo:
  #  path: D:\CodeRepository\aist
    path: D:\crm-center\crm-center

