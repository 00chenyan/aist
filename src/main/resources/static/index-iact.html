<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IATC - Impact Analysis of Test Cases</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">AIST</h1>
                <p class="subtitle">Analysis of Impact Scope of Task</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <div class="toolbar">
                <h2>Task List</h2>
                <div class="toolbar-actions" role="group" aria-label="Task list actions">
                    <button class="btn btn-primary" type="button" id="addTaskBtn">+ New Task</button>
                    <button class="btn btn-primary" type="button" id="batchAnalyzeBtn">Batch Analysis</button>
                    <button type="button" class="toolbar-refresh-btn" id="toolbarRefreshBtn" title="Refresh list" aria-label="Refresh list">
                        <svg class="iact-refresh-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                    </button>
                </div>
            </div>

            <!-- Task Table -->
            <div class="table-wrapper">
                <table class="task-table">
                    <thead>
                        <tr>
                            <th class="col-id">ID</th>
                            <th class="col-name">Task Name</th>
                            <th class="col-description">Description</th>
                            <th class="col-status">Status</th>
                            <th class="col-actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        <tr class="loading-row">
                            <td colspan="5">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📋</div>
                <p>No Tasks</p>
                <button class="btn btn-primary" id="addTaskBtnEmpty">+ New Task</button>
            </div>
        </main>
    </div>

    <!-- Config Modal -->
    <div id="configModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Task Configuration</h2>
                <button class="modal-close" id="closeConfigModal">&times;</button>
            </div>
            
            <div class="modal-body">
                <form id="configForm">
                    <div class="form-group">
                        <label for="taskSubject">Task Name</label>
                        <input type="text" id="taskSubject" class="form-control" required placeholder="Task name">
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Description</label>
                        <textarea id="taskDescription" class="form-control" rows="4" placeholder="Description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="gitCommitId">Git Commit ID</label>
                        <input type="text" id="gitCommitId" class="form-control" placeholder="e.g., abc123def456">
                    </div>
                    <div class="form-group">
                        <label for="projectName">Project Name</label>
                        <input type="text" id="projectName" class="form-control" placeholder="Project name">
                    </div>
                    <input type="hidden" id="configId">
                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelConfigBtn">Cancel</button>
                <button class="btn btn-primary" id="saveConfigBtn">Save Configuration</button>
            </div>
        </div>
    </div>

    <!-- Delete confirmation -->
    <div id="deleteConfirmModal" class="modal" style="display: none;">
        <div class="modal-content modal-confirm">
            <div class="modal-header">
                <h2>Delete</h2>
                <button type="button" class="modal-close" id="closeDeleteConfirmModal" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="deleteConfirmMessage" class="modal-confirm-text">Are you sure you want to delete?</p>
            </div>
            <div class="modal-footer modal-confirm-footer">
                <button type="button" class="btn btn-secondary" id="cancelDeleteConfirmBtn">Cancel</button>
                <button type="button" class="btn btn-secondary" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Preview Modal (Placeholder) -->
    <div id="previewModal" class="modal" style="display: none;">
        <div class="modal-content modal-lg modal-preview">
            <div class="modal-header">
                <h2>Analysis result</h2>
                <button class="modal-close" id="closePreviewModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="previewContent"></div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
